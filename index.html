<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf7f4;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP NAV ── */
    .topbar {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e8e3de;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #7c3aed;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; fill: #fff; }

    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .topbar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid #e0dbd5;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
    }
    .topbar-btn:hover { background: #f5f0eb; }
    .topbar-btn svg { width: 14px; height: 14px; }

    .topbar-spacer { flex: 1; }

    /* Device switcher */
    .device-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
      background: #f5f0eb;
      border-radius: 8px;
      padding: 3px;
    }
    .device-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-size: 12px;
      color: #888;
      cursor: pointer;
    }
    .device-btn svg { width: 14px; height: 14px; }
    .device-btn.active {
      background: #7c3aed;
      color: #fff;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-preview {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-preview:hover { background: #0284c7; }
    .btn-preview svg { width: 14px; height: 14px; }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e0dbd5;
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      color: #555;
    }
    .icon-btn:hover { background: #f5f0eb; }
    .icon-btn svg { width: 15px; height: 15px; }

    /* ── BODY LAYOUT ── */
    .body-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── ICON RAIL ── */
    .icon-rail {
      width: 48px;
      background: #fff;
      border-right: 1px solid #e8e3de;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
      flex-shrink: 0;
    }
    .rail-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
    }
    .rail-btn:hover { background: #f0ebf8; color: #7c3aed; }
    .rail-btn svg { width: 18px; height: 18px; }
    .rail-spacer { flex: 1; }
    .rail-btn.plus {
      background: #7c3aed;
      color: #fff;
    }
    .rail-btn.plus:hover { background: #6d28d9; }

    /* ── LEFT SIDEBAR ── */
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #e8e3de;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .sidebar-header span {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
    }
    .sidebar-header button {
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      display: flex;
      align-items: center;
    }
    .sidebar-header button svg { width: 16px; height: 16px; }

    .template-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px 10px;
    }
    .template-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #e0dbd5;
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 12px;
      color: #444;
      background: #faf7f4;
    }
    .template-input svg { width: 13px; height: 13px; color: #999; flex-shrink: 0; }
    .template-input span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .template-icon-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e0dbd5;
      border-radius: 6px;
      background: #faf7f4;
      cursor: pointer;
      color: #888;
      flex-shrink: 0;
    }
    .template-icon-btn svg { width: 13px; height: 13px; }

    /* Accordion items */
    .accordion-item {
      border-top: 1px solid #f0ebe6;
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      cursor: pointer;
      user-select: none;
    }
    .accordion-header:hover { background: #faf7f4; }
    .accordion-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #333;
    }
    .accordion-left svg { width: 14px; height: 14px; color: #888; }
    .badge {
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 20px;
      border: 1px solid #c4b5fd;
      color: #7c3aed;
      background: #f5f0ff;
      font-weight: 500;
    }
    .chevron { color: #aaa; }
    .chevron svg { width: 14px; height: 14px; }

    /* ── CANVAS AREA ── */
    .canvas {
      flex: 1;
      background: #faf7f4;
      overflow: auto;
      padding: 24px;
    }

    .grid-wrapper {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 8px;
    }

    .grid-cell {
      background: #fff;
      border: 1px solid #e5dfd9;
      border-radius: 6px;
      min-height: 160px;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">
      <!-- Asterisk / snowflake -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 2h-2v4.59l-3.29-3.3-1.42 1.42L9.59 8H5v2h4.59L6.3 13.29l1.42 1.42L11 11.41V22h2V11.41l3.29 3.3 1.42-1.42L14.41 10H19V8h-4.41l3.29-3.29-1.42-1.42L13 6.59V2z"/>
      </svg>
    </div>
    <span class="topbar-title">Custom Dashboard</span>
    <button class="topbar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      All Dashboards
    </button>

    <div class="topbar-spacer"></div>

    <!-- Device switcher -->
    <div class="device-switcher">
      <button class="device-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="7" y="2" width="10" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/>
        </svg>
        Smartphone
      </button>
      <button class="device-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
        Tablet
      </button>
      <button class="device-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="14" rx="2"/><line x1="8" y1="22" x2="16" y2="22"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
        </svg>
        Desktop
      </button>
    </div>

    <div class="topbar-spacer"></div>

    <!-- Right actions -->
    <div class="topbar-actions">
      <button class="btn-preview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        Preview
      </button>
      <button class="icon-btn" title="Sync">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button class="icon-btn" title="Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <button class="icon-btn" title="Download">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- BODY -->
  <div class="body-wrap">

    <!-- ICON RAIL -->
    <nav class="icon-rail">
      <button class="rail-btn" title="Dashboards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="rail-btn" title="Campaigns">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </button>
      <button class="rail-btn" title="Calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
      <button class="rail-btn" title="Analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a10 10 0 010 20"/><path d="M2 12h20"/>
        </svg>
      </button>
      <button class="rail-btn" title="Distribution">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <path d="M8 12s1-4 4-4 4 4 4 4-1 4-4 4-4-4-4-4z"/>
        </svg>
      </button>
      <button class="rail-btn" title="Explore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24,7.76 14.12,14.12 7.76,16.24 9.88,9.88"/>
        </svg>
      </button>
      <div class="rail-spacer"></div>
      <button class="rail-btn plus" title="Add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </nav>

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Page Construction</span>
        <button>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
      </div>

      <div class="template-row">
        <div class="template-input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/>
          </svg>
          <span>Dashboard – Template Name</span>
        </div>
        <button class="template-icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Accordion: Periods & Campaigns -->
      <div class="accordion-item">
        <div class="accordion-header">
          <div class="accordion-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Periods &amp; Campaigns
            <span class="badge">0</span>
          </div>
          <span class="chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6,9 12,15 18,9"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Accordion: Data & KPIs -->
      <div class="accordion-item">
        <div class="accordion-header">
          <div class="accordion-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3h18v18H3z" fill="none"/><line x1="8" y1="17" x2="8" y2="10"/>
              <line x1="12" y1="17" x2="12" y2="7"/><line x1="16" y1="17" x2="16" y2="13"/>
            </svg>
            Data &amp; KPIs
            <span class="badge">0 / 29</span>
          </div>
          <span class="chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6,9 12,15 18,9"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Accordion: Visualization Settings -->
      <div class="accordion-item">
        <div class="accordion-header">
          <div class="accordion-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M20 12h-2M6 12H4M19.07 19.07l-1.41-1.41M5.34 5.34L3.93 3.93M12 20v-2M12 6V4"/>
            </svg>
            Visualization Settings
          </div>
          <span class="chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6,9 12,15 18,9"/>
            </svg>
          </span>
        </div>
      </div>
    </aside>

    <!-- CANVAS / GRID -->
    <main class="canvas">
      <div class="grid-wrapper">
        <!-- Row 1 — 12 columns -->
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <!-- Row 2 -->
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <!-- Row 3 -->
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <!-- Row 4 -->
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      </div>
    </main>

  </div>
</body>
</html>
